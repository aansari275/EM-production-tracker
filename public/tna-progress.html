  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8f9fa; color: #1a1a2e; padding: 20px; max-width: 1200px; margin: 0 auto; }

  .subtitle { font-size: 13px; color: #94a3b8; margin-bottom: 20px; }
  h2 { font-size: 16px; font-weight: 700; color: #1e3a5f; margin: 28px 0 12px; padding-top: 20px; border-top: 2px solid #e2e8f0; }
  h2 .badge { font-size: 12px; font-weight: 600; background: #fee2e2; color: #dc2626; padding: 2px 10px; border-radius: 10px; margin-left: 8px; vertical-align: middle; }

  .filters { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
  .filters input, .filters select { padding: 8px 12px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 13px; background: white; }
  .filters input { width: 240px; }
  .count { font-size: 13px; color: #64748b; margin-bottom: 16px; }

  /* Legend */
  .legend { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; padding: 10px 16px; background: white; border-radius: 8px; border: 1px solid #e2e8f0; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #475569; }
  .legend-icon { width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 13px; }

  /* Order card */
  .card { background: white; border-radius: 10px; margin-bottom: 10px; border: 1px solid #e2e8f0; overflow: hidden; }
  .card-head { display: flex; justify-content: space-between; align-items: center; padding: 14px 20px; cursor: pointer; }
  .card-head:hover { background: #f8fafc; }
  .card-head .left { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .card-head .ops { font-weight: 700; font-size: 15px; color: #1e3a5f; }
  .card-head .buyer { font-size: 13px; color: #64748b; }
  .card-head .co { font-size: 11px; color: #94a3b8; background: #f1f5f9; padding: 2px 8px; border-radius: 4px; }
  .card-head .right { display: flex; align-items: center; gap: 12px; }
  .card-head .ship-info { text-align: right; }
  .card-head .ship-label { font-size: 10px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; }
  .card-head .ship-date { font-size: 14px; font-weight: 700; }
  .ship-date.overdue { color: #dc2626; }
  .ship-date.thisweek { color: #d97706; }
  .ship-date.upcoming { color: #2563eb; }
  .ship-date.future { color: #475569; }

  /* On-time summary badge */
  .ontime-badge { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 12px; white-space: nowrap; }
  .ontime-badge.perfect { background: #dcfce7; color: #15803d; }
  .ontime-badge.good { background: #dcfce7; color: #15803d; }
  .ontime-badge.mixed { background: #fef3c7; color: #b45309; }
  .ontime-badge.poor { background: #fee2e2; color: #dc2626; }

  .chevron { font-size: 12px; color: #94a3b8; transition: transform 0.2s; }
  .chevron.open { transform: rotate(180deg); }

  /* Details panel */
  .details { display: none; padding: 0 20px 16px; border-top: 1px solid #f1f5f9; }
  .details.open { display: block; }
  .detail-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px 20px; margin-bottom: 12px; padding-top: 12px; }
  .detail-item { font-size: 12px; }
  .detail-item .dl { color: #94a3b8; font-size: 10px; text-transform: uppercase; letter-spacing: 0.3px; }
  .detail-item .dv { color: #1e3a5f; font-weight: 600; }

  .items-table { width: 100%; font-size: 12px; border-collapse: collapse; margin-top: 8px; }
  .items-table th { text-align: left; color: #94a3b8; font-size: 10px; text-transform: uppercase; letter-spacing: 0.3px; padding: 6px 8px; border-bottom: 1px solid #e2e8f0; font-weight: 600; }
  .items-table td { padding: 6px 8px; border-bottom: 1px solid #f1f5f9; color: #475569; }
  .items-label { font-size: 12px; font-weight: 600; color: #64748b; margin-top: 12px; margin-bottom: 4px; }

  /* Stage detail table */
  .stage-table { width: 100%; font-size: 12px; border-collapse: collapse; margin-top: 12px; margin-bottom: 8px; }
  .stage-table th { text-align: left; color: #94a3b8; font-size: 10px; text-transform: uppercase; letter-spacing: 0.3px; padding: 6px 8px; border-bottom: 1px solid #e2e8f0; font-weight: 600; }
  .stage-table td { padding: 6px 8px; border-bottom: 1px solid #f1f5f9; color: #475569; }
  .stage-table .status-icon { font-size: 15px; text-align: center; }
  .stage-table .late-text { color: #dc2626; font-weight: 600; font-size: 11px; }
  .stage-table .ontime-text { color: #16a34a; font-weight: 600; font-size: 11px; }
  .stage-table .inprog-text { color: #d97706; font-weight: 600; font-size: 11px; }
  .stage-table .overdue-text { color: #dc2626; font-weight: 600; font-size: 11px; }
  .stage-table .pending-text { color: #94a3b8; font-size: 11px; }

  /* Progress bar */
  .progress-wrap { position: relative; margin: 0 30px; padding-top: 28px; padding-bottom: 28px; }
  .progress-track { height: 6px; background: #e2e8f0; border-radius: 3px; position: relative; }
  .progress-fill { height: 100%; border-radius: 3px; position: absolute; left: 0; top: 0; transition: width 0.3s; }
  .progress-fill.on-track { background: linear-gradient(90deg, #22c55e, #3b82f6); }
  .progress-fill.at-risk { background: linear-gradient(90deg, #f59e0b, #f59e0b); }
  .progress-fill.behind { background: linear-gradient(90deg, #ef4444, #ef4444); }

  /* Milestone dots with actual status */
  .milestone { position: absolute; top: -8px; transform: translateX(-50%); z-index: 2; }
  .milestone .dot-wrap { position: relative; width: 22px; height: 22px; }

  /* Base dot */
  .milestone .dot { width: 22px; height: 22px; border-radius: 50%; border: 3px solid white; box-shadow: 0 1px 4px rgba(0,0,0,0.12); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: white; position: relative; z-index: 2; }

  /* Status variants */
  .dot.done-ontime { background: #22c55e; }
  .dot.done-late { background: #dc2626; }
  .dot.in-progress { background: #f59e0b; animation: pulse-amber 2s infinite; }
  .dot.overdue-active { background: #dc2626; animation: pulse-red 1.5s infinite; }
  .dot.not-started { background: #cbd5e1; }

  @keyframes pulse-amber {
    0%, 100% { box-shadow: 0 0 0 0 rgba(245,158,11,0.4), 0 1px 4px rgba(0,0,0,0.12); }
    50% { box-shadow: 0 0 0 6px rgba(245,158,11,0), 0 1px 4px rgba(0,0,0,0.12); }
  }
  @keyframes pulse-red {
    0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4), 0 1px 4px rgba(0,0,0,0.12); }
    50% { box-shadow: 0 0 0 6px rgba(239,68,68,0), 0 1px 4px rgba(0,0,0,0.12); }
  }

  .milestone .label { position: absolute; bottom: 26px; left: 50%; transform: translateX(-50%); white-space: nowrap; font-size: 9px; font-weight: 700; color: #475569; text-transform: uppercase; letter-spacing: 0.3px; }
  .milestone .date-row { position: absolute; top: 26px; left: 50%; transform: translateX(-50%); white-space: nowrap; text-align: center; line-height: 1.3; }
  .milestone .target-date { font-size: 10px; color: #94a3b8; }
  .milestone .actual-date { font-size: 10px; font-weight: 700; }
  .milestone .actual-date.ontime { color: #16a34a; }
  .milestone .actual-date.late { color: #dc2626; }
  .milestone .actual-date.active { color: #d97706; }
  .milestone .delta { font-size: 9px; font-weight: 700; }
  .milestone .delta.late { color: #dc2626; }
  .milestone .delta.early { color: #16a34a; }

  .today-marker { position: absolute; top: -20px; bottom: -8px; width: 2px; background: #6366f1; z-index: 5; transform: translateX(-50%); border-radius: 1px; }
  .today-marker::before { content: 'TODAY'; position: absolute; top: -2px; left: 50%; transform: translateX(-50%); font-size: 8px; font-weight: 800; color: #6366f1; letter-spacing: 0.5px; background: white; padding: 0 4px; }
  .today-marker::after { content: ''; position: absolute; bottom: -1px; left: 50%; transform: translateX(-50%); width: 6px; height: 6px; background: #6366f1; border-radius: 50%; }

  .days-badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 600; margin-left: 8px; }
  .days-badge.overdue { background: #fee2e2; color: #dc2626; }
  .days-badge.thisweek { background: #fef3c7; color: #d97706; }
  .days-badge.upcoming { background: #dbeafe; color: #2563eb; }
  .days-badge.future { background: #f1f5f9; color: #64748b; }

  /* No TNA cards */
  .no-tna-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 8px; }
  .no-tna-card { background: white; border-radius: 8px; padding: 12px 16px; border: 1px solid #e2e8f0; border-left: 3px solid #f59e0b; cursor: pointer; }
  .no-tna-card:hover { background: #f8fafc; }
  .no-tna-card.expanded { grid-column: 1 / -1; border-left: 3px solid #3b82f6; background: #fafbff; }
  .no-tna-card .ops { font-weight: 700; font-size: 13px; color: #1e3a5f; }
  .no-tna-card .meta { font-size: 11px; color: #64748b; margin-top: 2px; }
  .no-tna-card .ship { font-size: 11px; margin-top: 4px; font-weight: 600; }
  .no-tna-details { display: none; margin-top: 8px; padding-top: 8px; border-top: 1px solid #f1f5f9; font-size: 11px; color: #64748b; }
  .no-tna-details.open { display: block; }

  .no-tna-details .d-label { color: #94a3b8; min-width: 80px; }
  .no-tna-details .info-and-form { display: flex; gap: 30px; flex-wrap: wrap; }
  .no-tna-details .info-col { flex: 0 0 220px; }
  .no-tna-details .form-col { flex: 1; min-width: 300px; }

  /* TNA Assignment Form */
  .tna-form { margin-top: 10px; padding-top: 10px; border-top: 1px solid #e2e8f0; }
  .tna-form-label { font-size: 12px; font-weight: 700; color: #1e3a5f; margin-bottom: 8px; }
  .tna-form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .tna-form-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 5px 8px; background: #f8fafc; border-radius: 6px; }
  .tna-form-row .stage-name { font-size: 12px; font-weight: 600; color: #475569; min-width: 60px; }
  .tna-form-row input[type="date"] { font-size: 12px; padding: 4px 6px; border: 1px solid #e2e8f0; border-radius: 4px; color: #1e3a5f; background: white; width: 130px; }
  .tna-form-row input[type="date"]:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.15); }
  .tna-form-actions { display: flex; gap: 8px; margin-top: 10px; align-items: center; }
  .btn-save-tna { padding: 7px 18px; font-size: 12px; font-weight: 700; border: none; border-radius: 6px; cursor: pointer; background: #1e3a5f; color: white; }
  .btn-save-tna:hover { background: #15304f; }
  .btn-save-tna:disabled { background: #94a3b8; cursor: not-allowed; }
  .btn-auto-fill { padding: 7px 14px; font-size: 11px; font-weight: 600; border: 1px solid #e2e8f0; border-radius: 6px; cursor: pointer; background: white; color: #475569; }
  .btn-auto-fill:hover { background: #f1f5f9; }
  .tna-saved-msg { font-size: 12px; color: #16a34a; font-weight: 600; display: none; }

  /* Stats bar */
  .stats-bar { display: flex; gap: 20px; margin-bottom: 16px; flex-wrap: wrap; }
  .stat-card { background: white; border-radius: 8px; padding: 12px 18px; border: 1px solid #e2e8f0; min-width: 140px; }
  .stat-card .stat-num { font-size: 24px; font-weight: 800; color: #1e3a5f; }
  .stat-card .stat-label { font-size: 11px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.3px; }
  .stat-card.green .stat-num { color: #16a34a; }
  .stat-card.amber .stat-num { color: #d97706; }
  .stat-card.red .stat-num { color: #dc2626; }
</style>
</head>

// === Mock actual dates generator ===
// Injects realistic actualDate into TNA stages for demo purposes
function injectMockActuals(orders) {
  var rng = seedRandom(42); // deterministic for consistency
  orders.forEach(function(o) {
    if (!o.tna) return;
    var stageMap = {};
    FIXED_STAGES.forEach(function(fs) {
      o.tna.forEach(function(s) {
        if (s.stage === fs.key && s.targetDate) stageMap[fs.key] = s;
      });
    });

    var activeStages = FIXED_STAGES.filter(function(fs) { return stageMap[fs.key]; });
    if (!activeStages.length) return;

    // Decide how many stages are "done" based on ship date proximity
    var daysToShip = days(TODAY, o.shipDate);
    var totalStages = activeStages.length;
    var doneCount;

    if (daysToShip < -10) {
      // Way overdue, most stages done but maybe last 1-2 stuck
      doneCount = Math.max(totalStages - Math.floor(rng() * 2), totalStages - 2);
    } else if (daysToShip < 0) {
      // Recently overdue
      doneCount = Math.max(totalStages - 1 - Math.floor(rng() * 2), totalStages - 3);
    } else if (daysToShip < 7) {
      // Ships this week
      doneCount = Math.max(Math.floor(totalStages * 0.7), totalStages - 3);
    } else if (daysToShip < 30) {
      // Ships within month
      doneCount = Math.floor(totalStages * 0.4 + rng() * totalStages * 0.2);
    } else {
      // Far out
      doneCount = Math.floor(rng() * totalStages * 0.3);
    }
    doneCount = Math.min(doneCount, totalStages);
    doneCount = Math.max(doneCount, 0);

    // Mark completed stages with actual dates
    for (var i = 0; i < totalStages; i++) {
      var stage = stageMap[activeStages[i].key];
      if (i < doneCount) {
        // Completed: 60% on time or early, 40% late
        var offset;
        if (rng() < 0.6) {
          offset = -Math.floor(rng() * 3); // 0-2 days early
        } else {
          offset = 1 + Math.floor(rng() * 5); // 1-5 days late
        }
        var target = new Date(stage.targetDate + 'T00:00:00');
        var actual = new Date(target.getTime() + offset * 86400000);
        stage.actualDate = actual.toISOString().split('T')[0];
      } else if (i === doneCount) {
        // Current "in progress" stage, no actual date yet
        stage.actualDate = null;
        stage._inProgress = true;
      } else {
        // Not started
        stage.actualDate = null;
      }
    }
  });
}

function seedRandom(seed) {
  return function() {
    seed = (seed * 16807 + 0) % 2147483647;
    return (seed - 1) / 2147483646;
  };
}

function fmt(d) {
  if (!d) return '-';
  return new Date(d + 'T00:00:00').toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });
}
function days(a, b) {
  return Math.round((new Date(b + 'T00:00:00') - new Date(a + 'T00:00:00')) / 86400000);
}
function statusCls(d) {
  if (!d) return 'na';
  var diff = days(TODAY, d);
  if (diff < 0) return 'overdue';
  if (diff <= 3) return 'thisweek';
  if (diff <= 14) return 'upcoming';
  return 'future';
}

// Compute stage status for an order
function getStageStatus(stage) {
  if (!stage.targetDate) return null;
  if (stage.actualDate) {
    var diff = days(stage.targetDate, stage.actualDate);
    return { type: diff <= 0 ? 'ontime' : 'late', delta: diff };
  }
  if (stage._inProgress) {
    var overdueDays = days(stage.targetDate, TODAY);
    return { type: overdueDays > 0 ? 'overdue' : 'in-progress', delta: overdueDays };
  }
  return { type: 'not-started', delta: 0 };
}

// Summary stats for an order
function getOrderSummary(o) {
  var total = 0, onTime = 0, late = 0, inProgress = 0, overdue = 0, notStarted = 0;
  var stageMap = {};
  o.tna.forEach(function(s) { stageMap[s.stage] = s; });

  FIXED_STAGES.forEach(function(fs) {
    var s = stageMap[fs.key];
    if (!s || !s.targetDate) return;
    total++;
    var st = getStageStatus(s);
    if (!st) return;
    if (st.type === 'ontime') onTime++;
    else if (st.type === 'late') late++;
    else if (st.type === 'in-progress') inProgress++;
    else if (st.type === 'overdue') overdue++;
    else notStarted++;
  });
  return { total: total, onTime: onTime, late: late, inProgress: inProgress, overdue: overdue, notStarted: notStarted };
}

function applyFilter(o, q, co, sf) {
  if (q && (o.salesNo + ' ' + o.buyerName + ' ' + o.merchantCode).toLowerCase().indexOf(q) === -1) return false;
  if (co && o.companyCode !== co) return false;
  if (sf === 'overdue' && days(TODAY, o.shipDate) >= 0) return false;
  if (sf === 'active' && days(TODAY, o.shipDate) < 0) return false;
  if (sf === 'has-late') {
    var sum = getOrderSummary(o);
    if (sum.late === 0 && sum.overdue === 0) return false;
  }
  if (sf === 'all-ontime') {
    var sum2 = getOrderSummary(o);
    if (sum2.late > 0 || sum2.overdue > 0) return false;
  }
  return true;
}

function autoFillDates(nid, orderDate, shipDate) {
  if (!shipDate) return;
  var start = new Date(orderDate + 'T00:00:00');
  var end = new Date(shipDate + 'T00:00:00');
  var totalDays = Math.max(days(orderDate, shipDate), 8);

  // Spread stages evenly between order date and ship date
  // Typical production flow percentages
  var pcts = [0, 0.1, 0.3, 0.5, 0.65, 0.75, 0.85, 0.95];
  FIXED_STAGES.forEach(function(fs, i) {
    var el = document.getElementById('date-' + nid + '-' + fs.key);
    if (!el) return;
    var offset = Math.round(totalDays * pcts[i]);
    var d = new Date(start.getTime() + offset * 86400000);
    el.value = d.toISOString().split('T')[0];
  });
}

function saveTna(nid, salesNo) {
  // Collect dates from form
  var tnaStages = [];
  var hasAny = false;
  FIXED_STAGES.forEach(function(fs) {
    var el = document.getElementById('date-' + nid + '-' + fs.key);
    var val = el ? el.value : '';
    tnaStages.push({ stage: fs.key, targetDate: val || null });
    if (val) hasAny = true;
  });

  if (!hasAny) {
    alert('Fill in at least one date');
    return;
  }

  // Find order by salesNo and move from NO_TNA to ALL
  var orderIdx = -1;
  for (var i = 0; i < NO_TNA.length; i++) {
    if (NO_TNA[i].salesNo === salesNo) { orderIdx = i; break; }
  }
  if (orderIdx === -1) return;

  var order = NO_TNA[orderIdx];
  order.tna = tnaStages;
  ALL.push(order);
  NO_TNA.splice(orderIdx, 1);

  // Show saved message briefly, then re-render
  var msg = document.getElementById('msg-' + nid);
  if (msg) { msg.style.display = 'inline'; }
  setTimeout(function() { render(); }, 600);
}

// Inject mock actual dates on load
injectMockActuals(ALL);
render();
</script>
</body>
</html>
